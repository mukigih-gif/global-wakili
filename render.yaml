# render.yaml — Global Wakili Legal Enterprise
# Blueprint deployment for Render.com
#
# BEFORE DEPLOYING: Set all env vars marked (SET MANUALLY) in the
# Render dashboard under Environment → Secret Files or individual vars.
#
# DEPLOYMENT ORDER:
#   1. Deploy this blueprint (creates API + Redis + notification worker)
#   2. Note your API URL (e.g. https://global-wakili-api.onrender.com)
#   3. Deploy frontend to Vercel → note Vercel URL
#   4. Set CORS_ORIGIN = your Vercel URL in Render dashboard
#   5. Set APP_URL   = your Render API URL in Render dashboard
#   6. Restart the API service
#   7. Run: npm run provision:tenant -- <id> ENTERPRISE <email>

services:
  # ── Redis (required by production env schema and BullMQ workers) ───────────
  - type: redis
    name: global-wakili-redis
    region: oregon
    plan: free               # 25MB — sufficient for staging; upgrade for production
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []          # only allow internal Render services

  # ── API Server ─────────────────────────────────────────────────────────────
  - type: web
    name: global-wakili-api
    runtime: node
    region: oregon
    plan: starter            # $7/mo — upgrade to standard for production
    buildCommand: npm install && npm run db:gen
    startCommand: npm run start --workspace=apps/api
    healthCheckPath: /ping
    autoDeploy: true         # auto-deploy on push to main
    envVars:
      # ── Core (required — will ABORT on startup if missing) ─────────────────
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false
        # SET MANUALLY — your Neon connection string
        # Format: postgresql://user:pass@ep-xxx.neon.tech/neondb?sslmode=require

      - key: JWT_SECRET
        sync: false
        # SET MANUALLY — minimum 32 chars, strong random
        # Generate: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"

      - key: JWT_EXPIRES_IN
        value: 8h
        # Access-token / session lifetime. No refresh flow yet, so this is the
        # full working-session length before a re-login is required.
        # NOTE: confirm no stale value (e.g. 10m) is set manually in the Render
        # dashboard — a dashboard override wins over this Blueprint value.

      - key: ENCRYPTION_KEY
        sync: false
        # SET MANUALLY — exactly 64 hex characters (32 bytes, AES-256)
        # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
        # Required: env schema enforces this in production

      - key: REDIS_URL
        fromService:
          name: global-wakili-redis
          type: redis
          property: connectionString
        # Auto-populated from the Redis service above — do not set manually

      - key: APP_URL
        value: https://global-wakili-api.onrender.com

      - key: CORS_ORIGIN
        value: https://global-wakili-api.vercel.app

      # ── Runtime settings ───────────────────────────────────────────────────
      - key: PORT
        value: 10000
        # Render serves on this port — do not change

      - key: LOG_LEVEL
        value: info

      - key: USE_NEON
        value: true

      # ── Security (optional but recommended for staging) ────────────────────
      - key: DOCUMENT_SIGNING_SECRET
        sync: false
        # SET MANUALLY — 64 hex chars
        # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"

      - key: DOCUMENT_STORAGE_PROVIDER
        value: local
        # Change to s3 after S3 bucket is configured

      - key: DOCUMENT_MALWARE_SCAN_REQUIRED
        value: false
        # Change to true after VIRUSTOTAL_API_KEY is set

      # ── AI (set for full AI functionality) ────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
        # SET MANUALLY — from console.anthropic.com
        # Without this, AI scopes run rules-based fallback only

      # ── Notifications (set for real delivery; simulation active without) ──
      - key: NOTIFICATION_FROM_EMAIL
        value: noreply@globalwakili.co.ke

      - key: SMS_SENDER_ID
        value: GlobalWakili

      - key: SMTP_HOST
        sync: false

      - key: SMTP_PORT
        value: 587

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASS
        sync: false

      - key: AT_API_KEY
        sync: false
        # Africa's Talking — africastalking.com

      - key: AT_USERNAME
        sync: false

      # ── Observability ─────────────────────────────────────────────────────
      - key: OTEL_ENABLED
        value: false
        # Set to true and configure OTEL_EXPORTER_OTLP_ENDPOINT for tracing

      - key: METRICS_TOKEN
        sync: false
        # Optional — secures the /metrics Prometheus endpoint

  # ── Notification Worker ────────────────────────────────────────────────────
  - type: worker
    name: global-wakili-notifications
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run db:gen
    startCommand: npm run worker:notifications --workspace=apps/api
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false

      - key: REDIS_URL
        fromService:
          name: global-wakili-redis
          type: redis
          property: connectionString

      - key: ENCRYPTION_KEY
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: LOG_LEVEL
        value: info

      - key: NOTIFICATION_FROM_EMAIL
        value: noreply@globalwakili.co.ke

      - key: SMS_SENDER_ID
        value: GlobalWakili

      - key: AT_API_KEY
        sync: false

      - key: AT_USERNAME
        sync: false

      - key: SMTP_HOST
        sync: false

      - key: SMTP_PORT
        value: 587

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASS
        sync: false
