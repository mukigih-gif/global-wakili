name: CI — Test, Build, Type Check

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  # ── 1. Schema + Type Check ──────────────────────────────────────────────────
  typecheck:
    name: Schema validation + TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
        run: npm run db:validate

      - name: Prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
        run: npm run db:gen

      - name: TypeScript — API
        run: cd apps/api && npx tsc --noEmit

  # ── 2. Unit + Integration Tests ─────────────────────────────────────────────
  test:
    name: Tests (unit + integration)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
        run: npm run db:gen

      - name: Unit tests (365 suites)
        working-directory: apps/api
        run: npm run test:tenant

      - name: Integration tests (DB-optional)
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run test:integration
        continue-on-error: true  # integration tests skip when DATABASE_URL absent

  # ── 3. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build API
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
        run: npm run db:gen

      - name: Build API
        working-directory: apps/api
        run: npx tsc --build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 7

  # ── 4. Deploy to Staging (main branch only) ──────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pending migrations (staging)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npm run db:deploy

      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/

      - name: Staging smoke test
        env:
          STAGING_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Staging health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Staging healthy: HTTP $STATUS"

  # ── 5. Deploy to Production (manual approval required) ───────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # requires manual approval in GitHub Environments settings
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pending migrations (production)
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npm run db:deploy

      - name: Production health check
        env:
          PROD_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Production health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Production healthy: HTTP $STATUS"
