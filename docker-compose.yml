version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: wakili
      POSTGRES_PASSWORD: wakili
      POSTGRES_DB: global_wakili
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports: ["9000:9000"]